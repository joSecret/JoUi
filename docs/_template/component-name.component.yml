$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: {{ComponentName}}
status: experimental
group: UI
version: 0.1.0
description: TODO — one-sentence description of {{ComponentName}}.

props:
  type: object
  properties:
    {{component_name}}_id:
      type: ['string', 'null']
      title: ID
      description: The HTML id attribute.
      default: null

    {{component_name}}_uc:
      type: array
      items:
        type: string
      title: Utility Classes
      default: []
      description: An array of additional CSS classes.

    {{component_name}}_att:
      type: Drupal\Core\Template\Attribute
      title: Attributes
      default: {}
      description: Additional HTML attributes.

slots:
  slot_content:
    title: Content
    description: The content of the component.
