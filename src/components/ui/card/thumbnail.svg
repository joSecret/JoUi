<svg width="250" height="160" viewBox="0 0 250 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --card: var(--c_neutral_100);
      --card-foreground: var(--c_neutral_900);
      --primary: var(--c_primary_500);
      --muted: var(--c_neutral_400);
    }
  </style>
  <g clip-path="url(#clip0)">
    <!-- Card shape -->
    <rect x="40" y="16" width="170" height="128" rx="8" fill="var(--card)" stroke="var(--muted)" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Image area -->
    <rect x="40" y="16" width="170" height="60" rx="8" fill="var(--primary)" fill-opacity="0.15"/>
    <rect x="40" y="52" width="170" height="24" fill="var(--primary)" fill-opacity="0.15"/>
    <!-- Mountain icon -->
    <path d="M96 60L115 30L134 60Z" fill="var(--primary)" fill-opacity="0.5"/>
    <path d="M118 60L132 38L154 60Z" fill="var(--primary)" fill-opacity="0.35"/>
    <circle cx="150" cy="35" r="7" fill="var(--primary)" fill-opacity="0.5"/>
    <!-- Text lines -->
    <rect x="56" y="88" width="80" height="8" rx="4" fill="var(--card-foreground)" fill-opacity="0.7"/>
    <rect x="56" y="104" width="120" height="6" rx="3" fill="var(--card-foreground)" fill-opacity="0.25"/>
    <rect x="56" y="116" width="100" height="6" rx="3" fill="var(--card-foreground)" fill-opacity="0.2"/>
    <!-- Button hint -->
    <rect x="56" y="130" width="48" height="8" rx="4" fill="var(--primary)" fill-opacity="0.6"/>
  </g>
  <defs>
    <clipPath id="clip0">
      <rect width="250" height="160" fill="white"/>
    </clipPath>
  </defs>
</svg>
