<svg xmlns="http://www.w3.org/2000/svg" width="250" height="160" viewBox="0 0 250 160" fill="none">
  <!-- Trigger button -->
  <rect x="20" y="20" width="210" height="36" rx="6" fill="var(--c_primary_500, #6366f1)" opacity="0.15"/>
  <rect x="20" y="20" width="210" height="36" rx="6" stroke="var(--c_primary_500, #6366f1)" stroke-width="1.5"/>
  <text x="80" y="43" font-family="sans-serif" font-size="13" fill="var(--c_primary_500, #6366f1)">Toggle content</text>
  <!-- Chevron down arrow -->
  <polyline points="206,33 214,41 222,33" stroke="var(--c_primary_500, #6366f1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Collapse body (open state) -->
  <rect x="20" y="64" width="210" height="76" rx="6" fill="var(--c_neutral_100, #f1f5f9)"/>
  <rect x="36" y="80" width="150" height="8" rx="4" fill="var(--c_neutral_400, #94a3b8)"/>
  <rect x="36" y="96" width="120" height="8" rx="4" fill="var(--c_neutral_400, #94a3b8)"/>
  <rect x="36" y="112" width="90" height="8" rx="4" fill="var(--c_neutral_400, #94a3b8)"/>
</svg>
