  <rect x="42" y="96" width="40" height="6" rx="3" fill="var(--c_primary_500, #0d6efd)" fill-opacity="0.7"/>
  <rect x="42" y="113" width="100" height="8" rx="4" fill="var(--c_neutral_900, #212529)" fill-opacity="0.4"/>
