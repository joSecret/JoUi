<svg width="250" height="160" viewBox="0 0 250 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --card: var(--c_neutral_100);
      --primary: var(--c_primary_500);
      --muted: var(--c_neutral_400);
      --danger: var(--c_danger_500);
    }
  </style>
  <g clip-path="url(#clip0)">
    <path d="M125 160V0" stroke="url(#gv)" stroke-opacity="0.3" stroke-dasharray="2 2"/>
    <path d="M250 80H0" stroke="url(#gh)" stroke-opacity="0.3" stroke-dasharray="2 2"/>

    <!-- Field 1: label + input -->
    <rect x="30" y="22" width="60" height="7" rx="3" fill="var(--muted)" fill-opacity="0.6"/>
    <rect x="30" y="34" width="190" height="22" rx="4" fill="var(--card)"/>
    <rect x="30" y="34" width="190" height="22" rx="4" stroke="var(--muted)" stroke-opacity="0.4" stroke-width="1"/>

    <!-- Field 2: label + input + description -->
    <rect x="30" y="68" width="80" height="7" rx="3" fill="var(--muted)" fill-opacity="0.6"/>
    <rect x="30" y="80" width="190" height="22" rx="4" fill="var(--card)"/>
    <rect x="30" y="80" width="190" height="22" rx="4" stroke="var(--muted)" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="30" y="107" width="110" height="5" rx="2" fill="var(--muted)" fill-opacity="0.35"/>

    <!-- Field 3: error state -->
    <rect x="30" y="120" width="50" height="6" rx="3" fill="var(--danger)" fill-opacity="0.5"/>
    <rect x="30" y="131" width="190" height="18" rx="4" fill="var(--card)"/>
    <rect x="30" y="131" width="190" height="18" rx="4" stroke="var(--danger)" stroke-opacity="0.7" stroke-width="1"/>
    <rect x="30" y="153" width="90" height="4" rx="2" fill="var(--danger)" fill-opacity="0.5"/>
  </g>
  <defs>
    <linearGradient id="gv" x1="125" y1="0" x2="125" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--muted)" stop-opacity="0"/>
      <stop offset="0.5" stop-color="var(--muted)"/>
      <stop offset="1" stop-color="var(--muted)" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="80" x2="250" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--muted)" stop-opacity="0"/>
      <stop offset="0.5" stop-color="var(--muted)"/>
      <stop offset="1" stop-color="var(--muted)" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip0">
      <rect width="250" height="160" fill="white"/>
    </clipPath>
  </defs>
</svg>
