$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Nav
status: stable
group: Navigation
version: 1.0.0
description: Flexible navigation component with optional tabs and pills variants. Supports accessible tab panels via JS behavior.

props:
  type: object
  properties:

    nav_variant:
      type: ['string', 'null']
      title: Variant
      description: Visual style variant for the nav.
      default: null
      enum:
        - null
        - tabs
        - pills

    nav_items:
      type: array
      title: Nav items
      description: Array of nav item objects. Each item has label, href, active, disabled, and optional tab_target.
      default: []

    nav_uc:
      type: array
      items:
        type: string
      title: Utility Classes
      default: []
      description: An array of extra utility or custom CSS classes for the nav wrapper.

    nav_att:
      type: Drupal\Core\Template\Attribute
      title: Attributes
      default: {}
      description: A list of HTML attributes for the nav wrapper.
