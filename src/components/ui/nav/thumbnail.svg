<svg xmlns="http://www.w3.org/2000/svg" width="250" height="160" viewBox="0 0 250 160">
  <!-- Background -->
  <rect width="250" height="160" fill="var(--c_neutral_100, #f8f9fa)" rx="6"/>

  <!-- Nav bar background -->
  <rect x="16" y="40" width="218" height="38" fill="none"/>

  <!-- Bottom border (tabs style) -->
  <line x1="16" y1="78" x2="234" y2="78" stroke="var(--c_neutral_400, #ced4da)" stroke-width="1.5"/>

  <!-- Active tab pill -->
  <rect x="16" y="44" width="62" height="34" rx="4 4 0 0" fill="var(--c_neutral_100, #f8f9fa)" stroke="var(--c_neutral_400, #ced4da)" stroke-width="1.5"/>
  <line x1="16" y1="78" x2="78" y2="78" stroke="var(--c_neutral_100, #f8f9fa)" stroke-width="2"/>
  <text x="47" y="66" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="var(--c_neutral_900, #212529)" text-anchor="middle">Active</text>

  <!-- Tab 2 -->
  <rect x="84" y="44" width="52" height="34" rx="4 4 0 0" fill="none"/>
  <text x="110" y="66" font-family="system-ui,sans-serif" font-size="11" fill="var(--c_primary_500, #0d6efd)" text-anchor="middle">Link</text>

  <!-- Tab 3 -->
  <rect x="142" y="44" width="52" height="34" rx="4 4 0 0" fill="none"/>
  <text x="168" y="66" font-family="system-ui,sans-serif" font-size="11" fill="var(--c_primary_500, #0d6efd)" text-anchor="middle">Link</text>

  <!-- Tab 4 disabled -->
  <text x="210" y="66" font-family="system-ui,sans-serif" font-size="11" fill="var(--c_neutral_400, #ced4da)" text-anchor="middle">Off</text>

  <!-- Pills row -->
  <rect x="16" y="96" width="58" height="26" rx="13" fill="var(--c_primary_500, #0d6efd)"/>
  <text x="45" y="113" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Active</text>

  <rect x="82" y="96" width="46" height="26" rx="13" fill="none"/>
  <text x="105" y="113" font-family="system-ui,sans-serif" font-size="11" fill="var(--c_primary_500, #0d6efd)" text-anchor="middle">Link</text>

  <rect x="136" y="96" width="46" height="26" rx="13" fill="none"/>
  <text x="159" y="113" font-family="system-ui,sans-serif" font-size="11" fill="var(--c_primary_500, #0d6efd)" text-anchor="middle">Link</text>
</svg>
