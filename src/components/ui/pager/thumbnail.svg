<svg width="250" height="160" viewBox="0 0 250 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --card: var(--c_neutral_100);
      --primary: var(--c_primary_500);
      --muted: var(--c_neutral_400);
    }
  </style>
  <g clip-path="url(#clip0)">
    <path d="M125 160L125 0" stroke="url(#grad-v)" stroke-opacity="0.3" stroke-dasharray="2 2"/>
    <path d="M250 80L0 80" stroke="url(#grad-h)" stroke-opacity="0.3" stroke-dasharray="2 2"/>

    <!-- prev arrow -->
    <rect x="18" y="64" width="32" height="32" rx="4" fill="var(--card)"/>
    <path d="M38 80l-7 0M31 80l4-4M31 80l4 4" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- page 1 -->
    <rect x="58" y="64" width="32" height="32" rx="4" fill="var(--card)"/>
    <text x="74" y="84" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="sans-serif">1</text>

    <!-- page 2 active -->
    <rect x="98" y="64" width="32" height="32" rx="4" fill="var(--primary)"/>
    <text x="114" y="84" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif" font-weight="600">2</text>

    <!-- page 3 -->
    <rect x="138" y="64" width="32" height="32" rx="4" fill="var(--card)"/>
    <text x="154" y="84" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="sans-serif">3</text>

    <!-- page 4 -->
    <rect x="178" y="64" width="32" height="32" rx="4" fill="var(--card)"/>
    <text x="194" y="84" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="sans-serif">4</text>

    <!-- next arrow -->
    <rect x="218" y="64" width="32" height="32" rx="4" fill="var(--card)"/>
    <path d="M228 80l7 0M235 80l-4-4M235 80l-4 4" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <defs>
    <linearGradient id="grad-v" x1="125" y1="0" x2="125" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--muted)" stop-opacity="0"/>
      <stop offset="0.5" stop-color="var(--muted)"/>
      <stop offset="1" stop-color="var(--muted)" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="grad-h" x1="0" y1="80" x2="250" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--muted)" stop-opacity="0"/>
      <stop offset="0.5" stop-color="var(--muted)"/>
      <stop offset="1" stop-color="var(--muted)" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip0">
      <rect width="250" height="160" fill="white"/>
    </clipPath>
  </defs>
</svg>
