<svg width="250" height="160" viewBox="0 0 250 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>:root { --card: var(--c_neutral_100); --primary: var(--c_primary_500); --muted: var(--c_neutral_400); }</style>
  <g clip-path="url(#c)">
    <path d="M125 160V0" stroke="url(#gv)" stroke-opacity="0.3" stroke-dasharray="2 2"/>
    <!-- Closed select -->
    <rect x="30" y="30" width="190" height="28" rx="4" fill="white" stroke="var(--muted)" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="42" y="41" width="80" height="6" rx="3" fill="var(--muted)" fill-opacity="0.4"/>
    <path d="M205 41 l5 6 l5-6" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Open dropdown -->
    <rect x="30" y="68" width="190" height="28" rx="4" fill="white" stroke="var(--primary)" stroke-width="1.5"/>
    <rect x="42" y="79" width="60" height="6" rx="3" fill="var(--muted)" fill-opacity="0.4"/>
    <path d="M205 83 l5-6 l5 6" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="30" y="100" width="190" height="52" rx="4" fill="white" stroke="var(--muted)" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="30" y="100" width="190" height="18" rx="0" fill="var(--primary)" fill-opacity="0.1"/>
    <rect x="42" y="107" width="60" height="5" rx="2" fill="var(--primary)" fill-opacity="0.6"/>
    <rect x="42" y="120" width="80" height="5" rx="2" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="42" y="133" width="55" height="5" rx="2" fill="var(--muted)" fill-opacity="0.3"/>
  </g>
  <defs>
    <linearGradient id="gv" x1="125" y1="0" x2="125" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--muted)" stop-opacity="0"/><stop offset="0.5" stop-color="var(--muted)"/><stop offset="1" stop-color="var(--muted)" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="c"><rect width="250" height="160" fill="white"/></clipPath>
  </defs>
