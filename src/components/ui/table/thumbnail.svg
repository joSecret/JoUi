<svg width="250" height="160" viewBox="0 0 250 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --card: var(--c_neutral_100);
      --primary: var(--c_primary_500);
      --muted: var(--c_neutral_400);
    }
  </style>
  <g clip-path="url(#clip0)">
    <path d="M125 160V0" stroke="url(#gv)" stroke-opacity="0.3" stroke-dasharray="2 2"/>

    <!-- Header row -->
    <rect x="20" y="24" width="210" height="22" rx="0" fill="var(--card)"/>
    <rect x="20" y="24" width="70" height="7" rx="3" fill="var(--muted)" fill-opacity="0.7" transform="translate(10 7)"/>
    <rect x="90" y="24" width="50" height="7" rx="3" fill="var(--muted)" fill-opacity="0.7" transform="translate(10 7)"/>
    <rect x="160" y="24" width="55" height="7" rx="3" fill="var(--muted)" fill-opacity="0.7" transform="translate(10 7)"/>
    <line x1="20" y1="46" x2="230" y2="46" stroke="var(--muted)" stroke-opacity="0.5" stroke-width="1.5"/>

    <!-- Row 1 -->
    <rect x="20" y="46" width="210" height="22" fill="white"/>
    <rect x="30" y="53" width="55" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="100" y="53" width="35" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="170" y="53" width="45" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <line x1="20" y1="68" x2="230" y2="68" stroke="var(--muted)" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Row 2 striped -->
    <rect x="20" y="68" width="210" height="22" fill="var(--card)"/>
    <rect x="30" y="75" width="60" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="100" y="75" width="40" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="170" y="75" width="30" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <line x1="20" y1="90" x2="230" y2="90" stroke="var(--muted)" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Row 3 -->
    <rect x="20" y="90" width="210" height="22" fill="white"/>
    <rect x="30" y="97" width="45" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="100" y="97" width="55" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="170" y="97" width="40" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <line x1="20" y1="112" x2="230" y2="112" stroke="var(--muted)" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Row 4 striped -->
    <rect x="20" y="112" width="210" height="22" fill="var(--card)"/>
    <rect x="30" y="119" width="50" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="100" y="119" width="35" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>
    <rect x="170" y="119" width="50" height="6" rx="3" fill="var(--muted)" fill-opacity="0.3"/>

    <!-- Outer border -->
    <rect x="20" y="24" width="210" height="110" rx="0" stroke="var(--muted)" stroke-opacity="0.3" stroke-width="1" fill="none"/>

    <!-- Column dividers -->
    <line x1="90" y1="24" x2="90" y2="134" stroke="var(--muted)" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="160" y1="24" x2="160" y2="134" stroke="var(--muted)" stroke-opacity="0.15" stroke-width="1"/>
  </g>
  <defs>
    <linearGradient id="gv" x1="125" y1="0" x2="125" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--muted)" stop-opacity="0"/>
      <stop offset="0.5" stop-color="var(--muted)"/>
      <stop offset="1" stop-color="var(--muted)" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip0">
      <rect width="250" height="160" fill="white"/>
    </clipPath>
  </defs>
</svg>
